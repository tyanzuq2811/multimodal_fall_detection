data_config: configs/data_config_v2.yaml

task:
  name: pose_pretrain
  num_classes: 1

data:
  val_ratio: 0.1
  pose_target_len: 60

train:
  seed: 42
  batch_size: 128
  num_workers: 4
  max_epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  device: auto

model:
  num_joints: 17
  embed_dim: 128
  backbone: temporal_cnn
  num_channels: 3

output:
  weights_dir: weights
  ckpt_name: pose_pretrain_omnifall_v2.pth

logging:
  log_dir: logs
  run_name: pose_pretrain_v2
  save_csv: true
  save_json: true

wandb:
  enable: true
  project: fall-detection
  entity: null
  tags: [pose, pretrain, v2]
  mode: online
  run_name: pose_pretrain_v2
