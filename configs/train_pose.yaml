data_config: configs/data_config_v2.yaml

task:
  name: pose
  num_classes: 1

train:
  seed: 42
  batch_size: 128
  num_workers: 4
  max_epochs: 150
  lr: 0.0001
  weight_decay: 0.001
  device: auto

model:
  num_joints: 17
  embed_dim: 128
  use_two_cameras: true
  backbone: temporal_cnn
  num_channels: 3

output:
  weights_dir: weights
  ckpt_name: pose_finetuned_upfall_v2.pth

input_checkpoints:
  pose_pretrained: weights/pose_pretrain_omnifall_v2.pth

logging:
  log_dir: logs
  run_name: pose_finetune_upfall_v2
  save_csv: true
  save_json: true

wandb:
  enable: true
  project: fall-detection
  entity: null
  tags: [pose, finetune, upfall, v2]
  mode: online
  run_name: pose_finetune_upfall_v2
