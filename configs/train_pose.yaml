data_config: configs/data_config.yaml

task:
  name: pose
  num_classes: 1

train:
  seed: 42
  batch_size: 128
  num_workers: 4
  max_epochs: 15
  lr: 0.001
  weight_decay: 0.0001
  device: auto

model:
  num_joints: 17
  embed_dim: 128
  use_two_cameras: true
  backbone: temporal_cnn

output:
  weights_dir: weights
  ckpt_name: pose_finetuned_upfall.pth

input_checkpoints:
  pose_pretrained: weights/pose_pretrained_omnifall.pth
