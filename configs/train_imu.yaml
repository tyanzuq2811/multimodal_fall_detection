data_config: configs/data_config.yaml

task:
  name: imu
  num_classes: 1

train:
  seed: 42
  batch_size: 256
  num_workers: 4
  max_epochs: 150
  lr: 0.0001
  weight_decay: 0.0001
  device: auto

model:
  imu_channels: 6
  embed_dim: 64
  dropout: 0.2

output:
  weights_dir: weights
  ckpt_name: imu_best_upfall.pth
