data_config: configs/data_config_v2.yaml

task:
  name: fusion
  num_classes: 1

train:
  seed: 42
  batch_size: 256
  num_workers: 4
  max_epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  device: auto
  modality_dropout_p: 0.1

model:
  pose_embed_dim: 128
  imu_embed_dim: 64
  pose_backbone: temporal_cnn
  hidden_dim: 16
  dropout: 0.2
  modality_weights:
    cam1: 1.4
    cam2: 1.4
    imu: 0.6

input_checkpoints:
  imu_ckpt: weights/imu_best_upfall.pth
  pose_ckpt: weights/pose_finetuned_upfall_v2.pth

output:
  weights_dir: weights
  ckpt_name: fusion_best.pth
